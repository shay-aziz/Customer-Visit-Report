<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלון קדם קורס – סימטרון</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#222;min-height:100vh}
.page-wrapper{max-width:794px;margin:0 auto;background:#f5f5f0}
.lang-bar{background:#fff;border-bottom:1px solid #ddd;padding:8px 16px;display:flex;align-items:center;gap:8px}
.lang-btn{background:none;border:1px solid #ccc;border-radius:20px;padding:4px 14px;cursor:pointer;font-size:13px;color:#555}
.lang-btn.active{background:#E8611A;color:#fff;border-color:#E8611A}
header{background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;display:flex;flex-direction:column;align-items:center;gap:3px}
.header-title{font-size:15px;font-weight:700;color:#E8611A;text-align:center}
.header-sub{font-size:12px;color:#888;text-align:center}
.notice-bar{background:#f8f4f0;border:1px solid #e8d8c8;border-radius:8px;padding:10px 14px;margin:12px 16px 0;font-size:12px;color:#777;text-align:center}
.intro-box{background:#fff8f5;border:1px solid #f5c0a0;border-radius:10px;padding:14px 16px;margin:12px 16px;font-size:14px;line-height:1.7;color:#333}
.intro-box strong{display:block;margin-bottom:4px;font-size:15px}
.page{display:none;padding:0 16px 120px}
.page.active{display:block}
.page-title{font-size:20px;font-weight:700;margin:18px 0 14px}
.section-label{background:#E8611A;color:#fff;display:inline-block;padding:4px 14px;border-radius:6px;font-size:13px;font-weight:700;margin:14px 0 8px}
.section-label.blue{background:#2A5FA8}
.field-group{margin-bottom:12px}
.field-label{font-size:14px;color:#444;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.required{color:#E8611A}
.field-input{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:15px;font-family:Arial;outline:none;color:#222;background:#fff}
.field-input:focus{border-color:#E8611A}
.radio-group{display:flex;gap:10px;margin-top:4px}
.radio-option{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #ccc;border-radius:8px;padding:8px 16px;cursor:pointer;flex:1;justify-content:center;font-size:14px}
.radio-option.selected{border-color:#E8611A;background:#fff8f5}
.radio-option input{accent-color:#E8611A}
.checkbox-item{background:#fff;border:1px solid #ddd;border-radius:8px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:flex-end;gap:10px;cursor:pointer;font-size:14px;flex-direction:row-reverse}
.checkbox-item input[type=checkbox]{accent-color:#E8611A;width:18px;height:18px;cursor:pointer;flex-shrink:0}
.checkbox-item:has(input:checked){border-color:#E8611A;background:#fff8f5}
.other-input{width:100%;border:1px solid #ccc;border-radius:8px;padding:8px 12px;font-size:13px;font-family:Arial;outline:none;margin-top:6px;background:#fff;direction:inherit}
.other-input:focus{border-color:#E8611A}
.course-card{background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:14px;margin-bottom:9px;cursor:pointer;display:flex;align-items:flex-start;gap:12px}
.course-card.selected{border-color:#E8611A;background:#fff8f5}
.course-card input{accent-color:#E8611A;margin-top:3px;flex-shrink:0}
.course-card-title{font-size:14px;font-weight:700;margin-bottom:3px}
.course-card-desc{font-size:12px;color:#666}
.cad-notice{background:#fff3f3;border:1px solid #f5c0b0;border-radius:8px;padding:11px 14px;font-size:13px;color:#c0392b;margin-top:4px}
.no-exp-btn{background:#fff;border:2px solid #ddd;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:14px;cursor:pointer;width:100%;text-align:center;color:#555}
.no-exp-btn.active{border-color:#E8611A;background:#fff8f5;color:#E8611A;font-weight:700}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sw-item{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;font-size:14px;cursor:pointer}
.sw-item:has(input:checked){border-color:#E8611A;background:#fff8f5}
.sw-item input{accent-color:#E8611A;width:18px;height:18px}
.skill-wrap{overflow-x:auto}
.skill-table{width:100%;border-collapse:collapse;margin-top:6px;min-width:280px}
.skill-table th{font-size:11px;color:#666;padding:5px 2px;text-align:center;font-weight:400}
.skill-table th:first-child{text-align:right;min-width:120px}
.skill-table td{padding:3px 2px;border-bottom:1px solid #eee;font-size:12px;vertical-align:middle}
.skill-table td:first-child{text-align:right;color:#333;font-size:11px;width:55%}
.skill-table td:not(:first-child){text-align:center;width:15%}
.skill-table input[type=radio]{accent-color:#E8611A;width:22px;height:22px;cursor:pointer}
.textarea-field{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:14px;font-family:Arial;min-height:80px;outline:none;resize:vertical;direction:inherit;background:#fff}
.textarea-field:focus{border-color:#E8611A}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:794px;background:#fff;border-top:1px solid #ddd;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 -2px 8px rgba(0,0,0,0.06)}
.pager{font-size:13px;color:#888;white-space:nowrap}
.btn{border:none;border-radius:8px;padding:11px 18px;font-size:14px;cursor:pointer;font-weight:700;white-space:nowrap}
.btn-next{background:#E8611A;color:#fff}
.btn-prev{background:#fff;color:#E8611A;border:2px solid #E8611A}
.action-bar{display:flex;flex-direction:column;gap:12px;margin-top:28px;align-items:center}
.btn-action{width:220px;padding:14px;font-size:16px;border-radius:10px;cursor:pointer;font-weight:700;border:none;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-pdf{background:#E8611A;color:#fff}
.btn-share{background:#fff;color:#E8611A;border:2px solid #E8611A}
.success-box{text-align:center;padding:32px 20px}
.error-msg{color:#c0392b;font-size:12px;margin-top:5px;display:none}
.hidden-field{display:none;margin-top:8px}
.hidden-field.show{display:block}
.loading-overlay{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:794px;height:100%;background:rgba(255,255,255,0.92);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading-overlay.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid #eee;border-top-color:#E8611A;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:#555}
#pdf-template{display:none;position:fixed;top:-99999px;left:0;width:900px;background:#fff;font-family:Arial,sans-serif;color:#222;direction:rtl}
</style>
</head>
<body>

<div class="page-wrapper">
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">מכין PDF...</div>
</div>

<div class="lang-bar">
  <span style="font-size:16px">🌐</span>
  <button class="lang-btn active" onclick="setLang('he')">עברית</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('ru')">Русский</button>
</div>

<header>
  <img id="logo-img" alt="Cimatron" style="height:38px;object-fit:contain">
  <div class="header-title" id="header-title">שאלון קדם קורס – סימטרון</div>
  <div class="header-sub" id="header-sub">צוות סימטרון ישראל</div>
  <div style="font-size:10px;color:#bbb;margin-top:2px">v3.5</div>
</header>

<div class="notice-bar" id="main-notice"></div>

<div class="page active" id="page1">
  <div class="intro-box"><strong id="intro-greeting"></strong><span id="intro-body"></span></div>
  <p class="page-title" id="p1title"></p>
  <div class="field-group">
    <div class="field-label"><span id="lbl-fname"></span><span class="required">*</span></div>
    <input class="field-input" id="fname" type="text">
    <div class="error-msg" id="err-fname"></div>
  </div>
  <div class="field-group">
    <div class="field-label"><span id="lbl-lname"></span><span class="required">*</span></div>
    <input class="field-input" id="lname" type="text">
    <div class="error-msg" id="err-lname"></div>
  </div>
  <div class="field-group">
    <div class="field-label"><span id="lbl-phone"></span><span class="required">*</span></div>
    <input class="field-input" id="phone" type="tel">
    <div class="error-msg" id="err-phone"></div>
  </div>
  <div class="field-group">
    <div class="field-label"><span id="lbl-company"></span><span class="required">*</span></div>
    <input class="field-input" id="company" type="text">
    <div class="error-msg" id="err-company"></div>
  </div>
  <div class="field-group">
    <div class="field-label" id="lbl-selfregister"></div>
    <div class="radio-group">
      <label class="radio-option selected" id="radio-yes-lbl">
        <input type="radio" name="selfregister" value="yes" checked onchange="toggleCandidateName()">
        <span id="lbl-yes"></span>
      </label>
      <label class="radio-option" id="radio-no-lbl">
        <input type="radio" name="selfregister" value="no" onchange="toggleCandidateName()">
        <span id="lbl-no"></span>
      </label>
    </div>
    <div class="hidden-field" id="candidate-name-field">
      <div class="field-label" style="margin-top:8px"><span id="lbl-candidate"></span><span class="required">*</span></div>
      <input class="field-input" id="candidate-name" type="text">
      <div class="error-msg" id="err-candidate"></div>
    </div>
  </div>
  <div class="field-group">
    <div class="field-label"><span id="lbl-role"></span><span class="required">*</span></div>
    <div style="font-size:12px;color:#E8611A;margin-bottom:6px" id="lbl-multiselect"></div>
    <div id="roles-list"></div>
    <div class="error-msg" id="err-role"></div>
  </div>
</div>

<div class="page" id="page2">
  <p class="page-title" id="p2title"></p>
  <div id="courses-list"></div>
  <div class="cad-notice" id="cad-notice-text"></div>
  <div class="error-msg" id="err-course" style="margin-top:8px"></div>
</div>

<div class="page" id="page3">
  <p class="page-title" id="p3title"></p>
  <div style="font-size:12px;color:#E8611A;margin-bottom:10px" id="p3-multi"></div>
  <button class="no-exp-btn" id="no-exp-btn" onclick="toggleNoExp()"></button>
  <div id="sw-grid-wrap">
    <div class="sw-grid" id="sw-grid"></div>
    <div class="hidden-field" id="sw-other-field" style="margin-top:8px">
      <input class="other-input" id="sw-other-text" type="text">
    </div>
  </div>
  <div class="error-msg" id="err-sw"></div>
</div>

<div class="page" id="page4">
  <p class="page-title" id="p4title"></p>
  <div id="cad-section">
    <div class="section-label" id="sec-cad">CAD</div>
    <div class="skill-wrap">
      <table class="skill-table">
        <thead><tr><th id="th-topic"></th><th id="th-none"></th><th id="th-basic"></th><th id="th-adv"></th></tr></thead>
        <tbody id="cad-rows"></tbody>
      </table>
    </div>
  </div>
  <div class="section-label" style="margin-top:14px" id="sec-cam">CAM</div>
  <div class="skill-wrap">
    <table class="skill-table">
      <thead><tr><th id="th-topic2"></th><th id="th-none2"></th><th id="th-basic2"></th><th id="th-adv2"></th></tr></thead>
      <tbody id="cam-rows"></tbody>
    </table>
  </div>
  <div id="gibbs-section" style="display:none">
    <div class="section-label blue" style="margin-top:14px">GibbsCAM</div>
    <div class="skill-wrap">
      <table class="skill-table">
        <thead><tr><th></th><th id="gth-none"></th><th id="gth-basic"></th><th id="gth-adv"></th></tr></thead>
        <tbody id="gibbs-rows"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="page" id="page5">
  <p class="page-title" id="p5title"></p>
  <div style="font-size:12px;color:#E8611A;margin-bottom:10px" id="p5-multi"></div>
  <div id="goals-list"></div>
  <div class="hidden-field" id="goals-other-field" style="margin-top:4px">
    <input class="other-input" id="goals-other-text" type="text">
  </div>
  <div class="error-msg" id="err-goals"></div>
  <div class="field-group" style="margin-top:14px">
    <div class="field-label"><span id="lbl-expectations"></span></div>
    <textarea class="textarea-field" id="expectations"></textarea>
  </div>
</div>

<div class="page" id="page-success">
  <div class="success-box">
    <div style="font-size:52px;margin-bottom:12px">✅</div>
    <h2 id="success-title" style="margin-bottom:8px;color:#E8611A"></h2>
    <p id="success-msg" style="color:#666;font-size:14px;line-height:1.7;white-space:pre-line"></p>
    <div class="action-bar">
      <button class="btn-action btn-pdf" onclick="doSavePDF()">
        <span style="font-size:18px">📄</span><span id="lbl-save-pdf">שמור PDF</span>
      </button>
      <button class="btn-action btn-share" onclick="doShare()">
        <span style="font-size:18px">↗</span><span id="lbl-share">שתף</span>
      </button>
    </div>
  </div>
</div>

<div id="pdf-template"></div>

<div class="bottom-bar" id="bottom-bar">
  <button class="btn btn-next" id="btn-next" onclick="nextPage()"></button>
  <div class="pager" id="pager">5 / 1</div>
  <button class="btn btn-prev" id="btn-prev" onclick="prevPage()"></button>
</div>

</div><!-- /page-wrapper -->

function t(k){return T[lang][k]||''}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.documentElement.lang=l;
  document.documentElement.dir=l==='he'?'rtl':'ltr';
  rebuildAll();
}

function toggleCandidateName(){
  document.querySelectorAll('.radio-option').forEach(e=>e.classList.remove('selected'));
  const c=document.querySelector('input[name=selfregister]:checked');
  if(c)c.closest('.radio-option').classList.add('selected');
  const isNo=c?.value==='no';
  document.getElementById('candidate-name-field').classList.toggle('show',isNo);
  if(!isNo)document.getElementById('candidate-name').value='';
}

function isGibbs(){return document.querySelector('input[name=course]:checked')?.value==='2';}
function updateGibbsSection(){
  const g=isGibbs();
  document.getElementById('gibbs-section').style.display=g?'block':'none';
  document.getElementById('cad-section').style.display=g?'none':'block';
}

function toggleNoExp(){
  noExpSelected=!noExpSelected;
  document.getElementById('no-exp-btn').classList.toggle('active',noExpSelected);
  const wrap=document.getElementById('sw-grid-wrap');
  wrap.style.opacity=noExpSelected?'0.35':'1';
  wrap.style.pointerEvents=noExpSelected?'none':'auto';

    document.querySelectorAll('#sw-grid input[type=checkbox]').forEach(cb=>{cb.checked=false;cb.dispatchEvent(new Event('change'));});
    document.getElementById('sw-other-field').classList.remove('show');
    document.getElementById('sw-other-text').value='';
  }

}

function rebuildAll(){

    'intro-greeting':'introGreeting','intro-body':'introBody',
    'p1title':'p1','p2title':'p2','p3title':'p3','p4title':'p4','p5title':'p5',
    'lbl-fname':'fname','lbl-lname':'lname','lbl-phone':'phone','lbl-company':'company',
    'lbl-selfregister':'selfregister','lbl-yes':'yes','lbl-no':'no','lbl-candidate':'candidate',
    'lbl-role':'role','lbl-multiselect':'multiselect','lbl-expectations':'expectations',
    'p3-multi':'p3multi','p5-multi':'p5multi','cad-notice-text':'cadNotice','no-exp-btn':'noExp',
    'err-fname':'errReq','err-lname':'errReq','err-phone':'errReq','err-company':'errReq',
    'err-candidate':'errReq','err-role':'errRole','err-course':'errCourse',
    'err-sw':'errSw','err-goals':'errGoals',
    'success-title':'successTitle','success-msg':'successMsg',
    'lbl-save-pdf':'savePdf','lbl-share':'share',

function buildRoles(){
  const el=document.getElementById('roles-list');
  const checked=Array.from(el.querySelectorAll('input:checked')).map(i=>i.value);
  const hadOther=el.querySelector('#role-other-text')?.value||'';
  const last=t('roles').length-1;
  el.innerHTML=t('roles').map((r,i)=>`<div class="checkbox-item" onclick="toggleCheck(this,event)"><span>${r}</span><input type="checkbox" value="${i}" ${checked.includes(String(i))?'checked':''}></div>`).join('');
  const ow=document.createElement('div');ow.className='hidden-field'+(checked.includes(String(last))?' show':'');ow.id='role-other-wrap';
  ow.innerHTML=`<input class="other-input" id="role-other-text" type="text" placeholder="${t('otherPlaceholder')}" value="${hadOther}">`;
  el.appendChild(ow);
  el.querySelectorAll('.checkbox-item').forEach((item,i)=>{
    item.querySelector('input').addEventListener('change',()=>{if(i===last)document.getElementById('role-other-wrap').classList.toggle('show',item.querySelector('input').checked);});
  });
}

function toggleCheck(div,event){const cb=div.querySelector('input[type=checkbox]');if(event&&event.target===cb)return;cb.checked=!cb.checked;cb.dispatchEvent(new Event('change'));}

function buildCourses(){
  const el=document.getElementById('courses-list');
  const sel=el.querySelector('input:checked')?.value;
  el.innerHTML=t('courses').map((c,i)=>`
    <div class="course-card ${sel==i?'selected':''}" onclick="selectCourse(${i},this)">
      <input type="radio" name="course" value="${i}" ${sel==i?'checked':''}><div>
      <div class="course-card-title">${c.t}</div><div class="course-card-desc">${c.d}</div></div>
    </div>`).join('');
}

function selectCourse(i,el){
  document.querySelectorAll('.course-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');el.querySelector('input').checked=true;
  document.getElementById('err-course').style.display='none';
}

function buildSoftware(){

  el.innerHTML=t('sw').map((s,i)=>`<div class="sw-item" onclick="toggleCheck(this,event)"><span>${s}</span><input type="checkbox" value="${i}" ${checked.includes(String(i))?'checked':''}></div>`).join('');

function buildSkillTables(){
  const cols=['none','basic','adv'];
  const prev={cad:{},cam:{},gibbs:{}};
  ['cad','cam','gibbs'].forEach(sec=>{document.querySelectorAll(`#${sec}-rows input`).forEach(inp=>{if(inp.checked)prev[sec][inp.name]=inp.value;});});
  ['cad','cam','gibbs'].forEach(sec=>{
    const el=document.getElementById(`${sec}-rows`);
    const rows=t(`${sec}Rows`);
    el.innerHTML=rows.map((r,ri)=>`<tr><td>${r}</td>${cols.map(c=>`<td><input type="radio" name="${sec}_${ri}" value="${c}" ${prev[sec][`${sec}_${ri}`]===c?'checked':''}></td>`).join('')}</tr>`).join('');
  });
}

function buildGoals(){

function updateNav(){
  const isLast=currentPage===totalPages;
  const btn=document.getElementById('btn-next');
  btn.textContent=isLast?t('nextFinal'):t('next');
  btn.className='btn btn-next';
  const prevBtn=document.getElementById('btn-prev');
  prevBtn.style.visibility=currentPage>1?'visible':'hidden';
  prevBtn.textContent=t('prev');
  document.getElementById('pager').textContent=`${totalPages} / ${currentPage}`;
  document.getElementById('bottom-bar').style.display=currentPage>totalPages?'none':'flex';
}

function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  if(n>totalPages)document.getElementById('page-success').classList.add('active');
  else{document.getElementById(`page${n}`).classList.add('active');if(n===4)updateGibbsSection();}
  window.scrollTo(0,0);
}

function validatePage(){
  let ok=true;
  const hide=id=>{const e=document.getElementById(id);if(e)e.style.display='none';};
  const show=id=>{const e=document.getElementById(id);if(e)e.style.display='block';};
  if(currentPage===1){
    ['fname','lname','phone','company'].forEach(f=>{
      if(!document.getElementById(f).value.trim()){show(`err-${f}`);ok=false;}else hide(`err-${f}`);
    });
    if(document.querySelector('input[name=selfregister]:checked')?.value==='no'){
      if(!document.getElementById('candidate-name').value.trim()){show('err-candidate');ok=false;}else hide('err-candidate');
    }
    if(!document.querySelectorAll('#roles-list input[type=checkbox]:checked').length){show('err-role');ok=false;}else hide('err-role');
  }
  if(currentPage===2){if(!document.querySelector('input[name=course]:checked')){show('err-course');ok=false;}else hide('err-course');}
  if(currentPage===3){
    if(!noExpSelected&&!document.querySelectorAll('#sw-grid input:checked').length){show('err-sw');ok=false;}else hide('err-sw');
  }
  if(currentPage===5){
    if(!document.querySelectorAll('#goals-list input[type=checkbox]:checked').length){show('err-goals');ok=false;}else hide('err-goals');
  }
  return ok;
}

function nextPage(){
  if(!validatePage())return;
  if(currentPage===totalPages){currentPage=totalPages+1;showPage(totalPages+1);updateNav();preparePDF();return;}
  currentPage++;showPage(currentPage);updateNav();
}
function prevPage(){if(currentPage>1){currentPage--;showPage(currentPage);updateNav();}}

function getFormData(){
  const roles=Array.from(document.querySelectorAll('#roles-list input[type=checkbox]:checked')).map(i=>t('roles')[i.value]);
  const roleOther=document.getElementById('role-other-text')?.value.trim();
  if(roleOther&&roles[roles.length-1]===t('roles')[t('roles').length-1])roles[roles.length-1]+=' – '+roleOther;
  const courseIdx=document.querySelector('input[name=course]:checked')?.value;
  const course=courseIdx!=null?t('courses')[courseIdx].t:'';
  let swText=noExpSelected?t('noExp'):Array.from(document.querySelectorAll('#sw-grid input:checked')).map(i=>t('sw')[i.value]).join(', ')||'–';
  if(!noExpSelected){const swOther=document.getElementById('sw-other-text')?.value.trim();const lastSw=t('sw').length-1;const swArr=swText.split(', ');if(swOther&&swArr[swArr.length-1]===t('sw')[lastSw]){swArr[swArr.length-1]+=' – '+swOther;swText=swArr.join(', ');}}
  const goals=Array.from(document.querySelectorAll('#goals-list input[type=checkbox]:checked')).map(i=>t('goals')[i.value]);
  const goalsOther=document.getElementById('goals-other-text')?.value.trim();
  if(goalsOther&&goals[goals.length-1]===t('goals')[t('goals').length-1])goals[goals.length-1]+=' – '+goalsOther;
  const getSkill=(sec,rows)=>rows.map((r,i)=>{const v=document.querySelector(`input[name=${sec}_${i}]:checked`)?.value;return{topic:r,level:{none:t('thNone'),basic:t('thBasic'),adv:t('thAdv')}[v]||'–'};});
  const isNo=document.querySelector('input[name=selfregister]:checked')?.value==='no';
  return{
    fname:document.getElementById('fname').value.trim(),lname:document.getElementById('lname').value.trim(),
    phone:document.getElementById('phone').value.trim(),company:document.getElementById('company').value.trim(),
    candidateName:isNo?document.getElementById('candidate-name').value.trim():'',
    roles:roles.join(', '),course,sw:swText,
    cadSkills:getSkill('cad',t('cadRows')),camSkills:getSkill('cam',t('camRows')),
    gibbsSkills:isGibbs()?getSkill('gibbs',t('gibbsRows')):[],
    goals,expectations:document.getElementById('expectations').value.trim()
  };
}

function buildPdfHTML(d){
  const dir=lang==='he'?'rtl':'ltr';
  const dateStr=new Date().toLocaleDateString();
  const orange='#E8611A',blue='#2A5FA8';
  const logo=logoBase64?`<img src="${logoBase64}" style="height:36px" alt="Cimatron">`:'<span style="color:#fff;font-weight:700;font-size:18px">cimatron</span>';

  const hdr=`<div style="background:${orange};padding:16px 28px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><div><div style="color:#fff;font-size:20px;font-weight:700">${t('headerTitle')}</div><div style="color:#ffe0cc;font-size:13px;margin-top:2px">${t('headerSub')}</div></div>${logo}</div>`;
  const ftr=`<div style="border-top:1px solid #eee;padding:10px 32px;margin-top:20px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#bbb"><span>${t('dateLabel')}: ${dateStr}</span></div>`;
  const sec=(txt,cls)=>`<div style="background:${cls==='blue'?blue:orange};color:#fff;display:inline-block;padding:5px 14px;border-radius:5px;font-size:13px;font-weight:700;margin:14px 0 10px">${txt}</div>`;
  const row=(l,v)=>v?`<div style="display:flex;gap:10px;margin-bottom:7px;font-size:13px;line-height:1.5"><span style="color:#999;min-width:120px;flex-shrink:0;font-size:12px">${l}</span><span style="color:#222;flex:1">${v}</span></div>`:'';
  const skillRows=(arr,cls)=>arr.map(s=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid #f0f0f0"><span style="color:#444;flex:1">${s.topic}</span><span style="color:${cls==='blue'?blue:orange};font-weight:700">${s.level}</span></div>`).join('');

  const content=`
    ${sec(t('p1'))}
    ${row(t('fname'),d.fname+' '+d.lname)}
    ${d.candidateName?row(t('candidate'),d.candidateName):''}
    ${row(t('phone'),d.phone)}
    ${row(t('company'),d.company)}
    ${row(t('role'),d.roles)}
    ${sec(t('p2'))}
    <div style="font-size:13px;font-weight:700;color:#222;margin-bottom:14px">${d.course}</div>
    ${sec(t('p3'))}
    <div style="font-size:13px;color:#222;margin-bottom:14px">${d.sw}</div>
    ${sec(t('p4'))}
    ${!isGibbs()&&d.cadSkills.length?`<div style="font-size:13px;font-weight:700;color:${orange};margin:8px 0 4px">CAD</div>${skillRows(d.cadSkills)}`:''}
    ${d.camSkills.length?`<div style="font-size:13px;font-weight:700;color:${orange};margin:10px 0 4px">CAM</div>${skillRows(d.camSkills)}`:''}
    ${d.gibbsSkills.length?`<div style="font-size:13px;font-weight:700;color:${blue};margin:10px 0 4px">GibbsCAM</div>${skillRows(d.gibbsSkills,'blue')}`:''}
    ${sec(t('p5'))}
    ${d.goals.map(g=>`<div style="font-size:13px;padding:3px 0;color:#333">• ${g}</div>`).join('')}
    ${d.expectations?`${sec(t('expectations').replace(/ \(.*\)/,''))}<div style="font-size:14px;color:#333;line-height:1.7">${d.expectations}</div>`:''}
  `;

  return `<div style="width:900px;background:#fff;font-family:Arial,sans-serif;direction:${dir};padding:0 32px 32px">${hdr}${content}${ftr}</div>`;
}

async function preparePDF(){
  const d=getFormData();
  const candidateName=(d.candidateName||d.fname+' '+d.lname).trim();
  savedFilename=`שאלון-קדם-קורס-${candidateName}.pdf`.replace(/\s+/g,'-');
  const overlay=document.getElementById('loading-overlay');
  document.getElementById('loading-text').textContent=t('loading');
  overlay.classList.add('show');
  const tmpl=document.getElementById('pdf-template');
  tmpl.innerHTML=buildPdfHTML(d);
  tmpl.style.display='block';
  tmpl.style.top='-99999px';
  await new Promise(r=>setTimeout(r,500));
  try{
    const {jsPDF}=window.jspdf;
    const A4_WIDTH_MM=210, A4_HEIGHT_MM=297;
    const SCALE=2.5;
    const PX_PER_MM=900/A4_WIDTH_MM; // pixels per mm at 900px wide
    const pageHeightPx=A4_HEIGHT_MM*PX_PER_MM;

    const canvas=await html2canvas(tmpl.children[0],{scale:SCALE,useCORS:true,backgroundColor:'#ffffff',logging:false,width:900});
    const totalHeightPx=canvas.height/SCALE;
    const totalPages=Math.ceil(totalHeightPx/pageHeightPx);

    const pdf=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
    for(let i=0;i<totalPages;i++){
      if(i>0)pdf.addPage();
      const srcY=i*pageHeightPx*SCALE;
      const srcH=Math.min(pageHeightPx*SCALE, canvas.height-srcY);
      const pageCanvas=document.createElement('canvas');
      pageCanvas.width=canvas.width;
      pageCanvas.height=pageHeightPx*SCALE;
      const ctx=pageCanvas.getContext('2d');
      ctx.fillStyle='#ffffff';
      ctx.fillRect(0,0,pageCanvas.width,pageCanvas.height);
      ctx.drawImage(canvas,0,srcY,canvas.width,srcH,0,0,canvas.width,srcH);
      pdf.addImage(pageCanvas.toDataURL('image/jpeg',0.85),'JPEG',0,0,A4_WIDTH_MM,A4_HEIGHT_MM);
    }
    savedPdfBlob=pdf.output('blob');
  }catch(e){console.error(e);alert('שגיאה ביצירת PDF');}
  finally{tmpl.style.display='none';overlay.classList.remove('show');}
}

function doSavePDF(){
  if(!savedPdfBlob)return;
  const url=URL.createObjectURL(savedPdfBlob);
  const a=document.createElement('a');a.href=url;a.download=savedFilename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

async function doShare(){
  if(!savedPdfBlob)return;
  const file=new File([savedPdfBlob],savedFilename,{type:'application/pdf'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({title:t('headerTitle'),files:[file]});}
    catch(e){if(e.name!=='AbortError')doSavePDF();}
  }else{
    window.open(`mailto:shay.aziz@cimatron.com?subject=${encodeURIComponent(t('headerTitle'))}`,'_self');
  }
}

rebuildAll();
</script>
